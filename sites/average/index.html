<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Average</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏳</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="modal">
        <div class="dialog">
            <div class="dialog-titlebar">
                <span class="win-btn"></span>
                <span class="dialog-title">Average</span>
            </div>
            <div class="dialog-body">
                <div class="field">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" required>
                </div>
                <div class="field">
                    <label for="country">Country of Residence</label>
                    <select id="country"></select>
                </div>
                <div class="dialog-btns">
                    <button id="start">OK</button>
                </div>
            </div>
        </div>
    </div>

    <div id="borrowed" class="hidden">
        <p>…</p>
    </div>

    <div id="app" class="hidden">
        <canvas id="canvas"></canvas>
    </div>

    <button id="info-btn" class="hidden" onclick="openInfo()">i</button>

    <div id="info-modal" style="display:none;">
        <div class="dialog">
            <div class="dialog-titlebar">
                <span class="win-btn"></span>
                <span class="dialog-title">Average Info</span>
            </div>
            <div class="dialog-body">
                <table class="info-table">
                    <tr><td>Today's date</td><td id="info-today"></td></tr>
                    <tr><td>Date of birth</td><td id="info-dob"></td></tr>
                    <tr><td>Age</td><td id="info-age"></td></tr>
                    <tr><td>Country of residence</td><td id="info-country"></td></tr>
                    <tr><td>Average lifespan (years)</td><td id="info-lifespan"></td></tr>
                    <tr><td>Average lifespan (days)</td><td id="info-total"></td></tr>
                    <tr><td>Days used</td><td id="info-used"></td></tr>
                    <tr><td>Days remaining</td><td id="info-remaining"></td></tr>
                </table>
                <div class="dialog-btns">
                    <button class="info-ok" onclick="document.getElementById('info-modal').style.display='none'">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
