<body>
  <div class="page-layout">
    <site-sidebar root="../.."></site-sidebar>
    <main class="main-content">
      <section id="intro-heading">
        <h1>The Buzzies</h1>
        <h2>Illustration</h2>
        <hr>
        <p>The Buzzies was a collaborative project with <a href="https://paulamarques.info/" target="_blank">Paula Marques</a>, experimenting with a little digital family.</p>
        <br>
        <a class="btn-back" href="website/index.html" target="_blank">Go Buzzies</a>
        <br><br><br>
        <div id="gallery"></div>
      </section>
    </main>
  </div>

  <script>
    (function () {
      const images = [
        { src: 'images/buzzies-logo.gif',          alt: 'The Buzzies logo' },
        { src: 'images/buzzies-characters.gif',    alt: 'The Buzzies characters' },
        { src: 'images/andre_apple_stickers.jpg',  alt: 'The Buzzies — Andre Apple stickers' },
        { src: 'images/sticker-andre-apple.png',   alt: 'The Buzzies — Andre Apple sticker sheet' },
        { src: 'images/sticker-chad-cheese.png',   alt: 'The Buzzies — Chad Cheese sticker sheet' },
        { src: 'images/sticker-clive.png',         alt: 'The Buzzies — Clive sticker sheet' },
        { src: 'images/sticker-lemon.png',         alt: 'The Buzzies — Lemon sticker sheet' },
        { src: 'images/sticker-the-beat.png',      alt: 'The Buzzies — The Beat sticker sheet' },
        { src: 'images/calendar.jpg',              alt: 'The Buzzies — calendar' },
        { src: 'images/memory-cards-photo-1.jpg',  alt: 'The Buzzies — memory cards' },
        { src: 'images/memory-cards-photo-2.jpg',  alt: 'The Buzzies — memory cards' },
        { src: 'images/memory-cards-photo-3.jpg',  alt: 'The Buzzies — memory cards' },
        { src: 'images/hairy-man.png',             alt: 'The Buzzies — hairy man' },
        { src: 'images/memory-card-02.jpg',        alt: 'The Buzzies — memory card' },
        { src: 'images/memory-card-03.jpg',        alt: 'The Buzzies — memory card' },
        { src: 'images/memory-card-04.jpg',        alt: 'The Buzzies — memory card' },
        { src: 'images/memory-card-05.jpg',        alt: 'The Buzzies — memory card' },
        { src: 'images/memory-card-06.jpg',        alt: 'The Buzzies — memory card' },
        { src: 'images/memory-card-07.jpg',        alt: 'The Buzzies — memory card' },
        { src: 'images/memory-card-08.jpg',        alt: 'The Buzzies — memory card' },
        { src: 'images/memory-card-09.jpg',        alt: 'The Buzzies — memory card' },
        { src: 'images/memory-card-10.jpg',        alt: 'The Buzzies — memory card' },
        { src: 'images/memory-card-11.jpg',        alt: 'The Buzzies — memory card' },
        { src: 'images/memory-card-12.jpg',        alt: 'The Buzzies — memory card' },
      ];

      const gallery = document.getElementById('gallery');
      let i = 0;

      while (i < images.length) {
        const remaining = images.length - i;
        const maxCols = Math.min(3, remaining);
        const cols = Math.floor(Math.random() * maxCols) + 1;

        if (cols === 1) {
          const img = document.createElement('img');
          img.src = images[i].src;
          img.alt = images[i].alt;
          gallery.appendChild(img);
        } else {
          const row = document.createElement('div');
          row.style.cssText = `display:grid;grid-template-columns:repeat(${cols},1fr);gap:12px;margin-bottom:20px`;
          for (let j = 0; j < cols; j++) {
            const img = document.createElement('img');
            img.src = images[i + j].src;
            img.alt = images[i + j].alt;
            img.style.marginBottom = '0';
            img.style.height = 'auto';
            row.appendChild(img);
          }
          gallery.appendChild(row);
        }

        i += cols;
      }
    })();
  </script>

</body>

</html>
